name: Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            clang-tidy \
            clang-format \
            cppcheck

      - name: Configure (generate compile_commands.json)
        run: >
          cmake -B build 
          -G Ninja 
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON 
          -G Ninja -DBUILD_DOXYGEN=OFF

      - name: Run clang-format
        run: |
          clang-format --dry-run --Werror \
            $(git ls-files '*.c' '*.h')

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --inconclusive \
            --error-exitcode=1 \
            --std=c11 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            -I include \
            src

      - name: Run clang-tidy
        run: |
          clang-tidy \
            $(git ls-files 'src/*.c') \
            -p build
